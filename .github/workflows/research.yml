name: Research via Claude

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

concurrency:
  group: vault-update
  cancel-in-progress: false

jobs:
  research:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') && github.event.issue.user.type != 'Bot') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Research
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "WebSearch", "WebFetch", "Read", "Write", "Edit", "Glob", "Grep"]
              }
            }
          claude_args: '--allowedTools "Bash,WebSearch,WebFetch,Read,Write,Edit,Glob,Grep"'
          prompt: |
            あなたはナレッジベースのリサーチ担当です。
            CLAUDE.md の指示に従い、Issue のコメントからリサーチトピックを抽出して調査してください。

            手順:
            1. Issue の本文・コメントからリサーチトピックを抽出
            2. WebSearch でトピックを調査（複数の検索クエリを試す）
            3. 重要なソースを WebFetch で取得し vault/raw/ に保存
            4. vault/wiki/ にページを作成:
               - ファイル名は英語 kebab-case、本文は日本語
               - 適切なタグ（vault/tags.md を参照）を付与
               - 記事の OGP 画像やサムネイル画像の URL があれば、wiki ページの冒頭（# タイトルの直後）に ![記事タイトル](画像URL) で埋め込む
               - 関連する既存 wiki ページへ [[wiki/ページ名]] でリンク
               - 1つのトピックから複数ページ（要約、エンティティ、概念）を作成してよい
            5. vault/index.md を更新
            6. vault/log.md に記録
            7. git add → git commit → git push origin main で変更をリモートに反映
            8. Issue にコメントで結果を報告（作成したページ一覧と要約）

      - name: Auto-merge Claude's branch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "Merging branch $CURRENT_BRANCH into main via API..."
            gh api repos/${{ github.repository }}/merges \
              -f base=main \
              -f head="$CURRENT_BRANCH" \
              -f commit_message="auto-merge: research from issue #${{ github.event.issue.number }}"
            echo "Deleting merged branch..."
            gh api repos/${{ github.repository }}/git/refs/heads/"$CURRENT_BRANCH" -X DELETE || true
          else
            echo "No branch change detected, skipping merge."
          fi
